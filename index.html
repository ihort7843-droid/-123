<!DOCTYPE html>
<html lang="en">
<body>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <meta charset="UTF-8">
    <title>Пошук фільмів</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 10px;
            border: none;
        }

        button {
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: orange;
            cursor: pointer;
        }

        .movies {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .movie {
            background: #222;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            width: 200px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>🎬 Пошук фільмів</h1>

<input type="text" id="search" placeholder="Введи назву фільму">
<button onclick="searchMovies()">Шукати</button>

<div class="movies" id="movies"></div>

<script>
    const API_KEY = "YOUR_API_KEY";

    function searchMovies() {
        const query = document.getElementById("search").value;

        fetch(`https://www.omdbapi.com/?s=${query}&apikey=${API_KEY}`)
            .then(res => res.json())
            .then(data => {
                const moviesDiv = document.getElementById("movies");
                moviesDiv.innerHTML = "";

                if (data.Search) {
                    data.Search.forEach(movie => {
                        fetch(`https://www.omdbapi.com/?i=${movie.imdbID}&apikey=${API_KEY}`)
                            .then(res => res.json())
                            .then(details => {
                                moviesDiv.innerHTML += `
                                    <div class="movie">
                                        <img src="${details.Poster}" alt="">
                                        <h3>${details.Title}</h3>
                                        <p>⭐ ${details.imdbRating}</p>
                                        <p>${details.Year}</p>
                                    </div>
                                `;
                            });
                    });
                } else {
                    moviesDiv.innerHTML = "<p>Нічого не знайдено 😢</p>";
                }
            });
    }
</script>

</body>
</html>
</body>
</html>
